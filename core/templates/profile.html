<!DOCTYPE html>
<html>
<head>
    <title>GradPilot - Profile Setup</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #222;
            font-size: 30px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 13px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Choose Your Target Role</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Target Role</label>
        <select name="target_role" required>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Web Developer">Web Developer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="AI/ML">AI/ML</option>
            <option value="Not Sure Yet">Not Sure Yet</option>
        </select>

        <button type="submit">Continue</button>
    </form>

    <p class="subtitle">Start building your placement journey 🚀</p>
</div>

</body>
</html>
